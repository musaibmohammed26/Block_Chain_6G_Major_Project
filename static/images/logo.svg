<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0066cc" opacity="0.1" stroke="#0066cc" stroke-width="2"/>
  
  <!-- 6G nodes/connections -->
  <g stroke="#0066cc" stroke-width="1.5" fill="none">
    <!-- Center node -->
    <circle cx="50" cy="50" r="4" fill="#0066cc"/>
    
    <!-- Outer nodes -->
    <circle cx="30" cy="30" r="3" fill="#0066cc"/>
    <circle cx="70" cy="30" r="3" fill="#0066cc"/>
    <circle cx="30" cy="70" r="3" fill="#0066cc"/>
    <circle cx="70" cy="70" r="3" fill="#0066cc"/>
    <circle cx="50" cy="20" r="3" fill="#0066cc"/>
    <circle cx="50" cy="80" r="3" fill="#0066cc"/>
    
    <!-- Connections -->
    <line x1="50" y1="50" x2="30" y2="30"/>
    <line x1="50" y1="50" x2="70" y2="30"/>
    <line x1="50" y1="50" x2="30" y2="70"/>
    <line x1="50" y1="50" x2="70" y2="70"/>
    <line x1="50" y1="50" x2="50" y2="20"/>
    <line x1="50" y1="50" x2="50" y2="80"/>
  </g>
  
  <!-- 6G text -->
  <text x="50" y="90" font-size="14" font-weight="bold" text-anchor="middle" fill="#0066cc">6G</text>
</svg>
